<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Manutenção Preventiva</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- My CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                CheckSeg
            </a>
            <span class="navbar-text text-light opacity-75">MVP Sprint 2</span>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row g-4">
            <!-- Coluna do Formulário -->
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">
                        <h5 class="card-title fw-bold mb-4 text-primary">Novo Cadastro</h5>
                        <form id="cadastroForm">
                            <div class="mb-3">
                                <label for="nomeCliente" class="form-label fw-medium">Nome do Cliente</label>
                                <input type="text" class="form-control" id="nomeCliente" required
                                    placeholder="Ex: Empresa Silva">
                            </div>
                            <div class="mb-3">
                                <label for="tipoEquipamento" class="form-label fw-medium">Tipo de Equipamento</label>
                                <select class="form-select" id="tipoEquipamento" required>
                                    <option value="" selected disabled>Selecione...</option>
                                    <option value="Ar Condicionado">Ar Condicionado</option>
                                    <option value="Gerador">Gerador</option>
                                    <option value="Compressor">Compressor</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="dataInstalacao" class="form-label fw-medium">Data de Instalação</label>
                                <input type="date" class="form-control" id="dataInstalacao" required>
                            </div>
                            <div class="mb-3">
                                <label for="telefoneCliente" class="form-label fw-medium">Telefone (WhatsApp)</label>
                                <input type="tel" class="form-control" id="telefoneCliente" required
                                    placeholder="Ex: 11987654321">
                            </div>
                            <button type="submit"
                                class="btn btn-primary w-100 py-2 fw-medium mt-3 shadow-sm btn-cadastro">
                                Salvar Cadastro
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Coluna da Listagem -->
            <div class="col-lg-8">
                <!-- Dashboard de Resumo -->
                <div class="row g-3 mb-4">
                    <div class="col-sm-6 col-md-3">
                        <div class="card text-center btn-dashboard shadow-sm border-0 active" data-filter="todos"
                            id="cardTodos">
                            <div class="card-body p-3">
                                <h6 class="text-muted mb-1 fw-medium">Total</h6>
                                <h3 class="fw-bold mb-0 text-dark" id="countTodos">0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-md-3">
                        <div class="card text-center btn-dashboard shadow-sm border-0" data-filter="em-dia"
                            id="cardEmDia">
                            <div class="card-body p-3">
                                <h6 class="text-success mb-1 fw-medium">Em dia</h6>
                                <h3 class="fw-bold mb-0 text-success" id="countEmDia">0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-md-3">
                        <div class="card text-center btn-dashboard shadow-sm border-0" data-filter="proximo"
                            id="cardProximo">
                            <div class="card-body p-3">
                                <h6 class="text-warning mb-1 fw-medium text-dark-warning">Próximos</h6>
                                <h3 class="fw-bold mb-0 text-warning text-dark-warning" id="countProximo">0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-md-3">
                        <div class="card text-center btn-dashboard shadow-sm border-0" data-filter="vencido"
                            id="cardVencido">
                            <div class="card-body p-3">
                                <h6 class="text-danger mb-1 fw-medium">Vencidos</h6>
                                <h3 class="fw-bold mb-0 text-danger" id="countVencido">0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="card-title fw-bold mb-0 text-dark">Equipamentos Cadastrados</h5>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col">Cliente</th>
                                        <th scope="col">Contato</th>
                                        <th scope="col">Equipamento</th>
                                        <th scope="col">Instalação</th>
                                        <th scope="col">Vencimento</th>
                                        <th scope="col">Status</th>
                                        <th scope="col" class="text-end">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaClientes">
                                    <!-- Os dados serão inseridos aqui via JS -->
                                </tbody>
                            </table>

                            <!-- Estado Vazio -->
                            <div id="estadoVazio" class="text-center text-muted py-5">
                                <p class="mb-0 fs-5">Nenhum equipamento encontrado.</p>
                                <small class="opacity-75">Tente alterar os filtros ou adicione um novo cadastro.</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
